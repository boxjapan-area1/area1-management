<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoxWorks 2026 — エリア営業1部 参加者ダッシュボード</title>
<style>
  :root{
    --blue:#0061d5;--blue-dk:#003c84;--blue-lt:#e8f0fe;
    --osaka:#d35400;--osaka-dk:#922b21;--osaka-lt:#fdebd0;
    --cco:#16a34a;--cco-dk:#14532d;--cco-lt:#dcfce7;
    --gray-bg:#f0f2f5;--gray-bd:#dde1e7;--text:#1a1a2e;--text-2:#5f6368;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--gray-bg);color:var(--text);min-height:100vh;}

  .topnav{color:#fff;padding:0 28px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25);gap:16px;transition:background .3s;}
  .topnav.ev-tokyo{background:linear-gradient(135deg,var(--blue-dk),var(--blue));}
  .topnav.ev-osaka{background:linear-gradient(135deg,var(--osaka-dk),var(--osaka));}
  .topnav.ev-cco{background:linear-gradient(135deg,var(--cco-dk),var(--cco));}
  .topnav .logo{font-size:19px;font-weight:800;letter-spacing:-.5px;}
  .topnav .logo span{opacity:.7;font-weight:400;font-size:13px;margin-left:8px;}
  .topnav .date{margin-left:auto;font-size:12px;opacity:.8;}

  .event-switcher{display:flex;background:#fff;border-bottom:2px solid var(--gray-bd);padding:0 28px;position:sticky;top:56px;z-index:190;box-shadow:0 1px 6px rgba(0,0,0,.06);}
  .event-tab{padding:14px 28px;font-size:14px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--text-2);transition:all .15s;display:flex;align-items:center;gap:8px;white-space:nowrap;}
  .event-tab.active-tokyo{color:var(--blue);border-bottom-color:var(--blue);}
  .event-tab.active-osaka{color:var(--osaka);border-bottom-color:var(--osaka);}
  .event-tab.active-cco{color:var(--cco);border-bottom-color:var(--cco);}
  .ev-badge.cc{background:var(--cco-lt);color:var(--cco);}
  .ev-badge{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:700;}
  .ev-badge.tk{background:var(--blue-lt);color:var(--blue);}
  .ev-badge.os{background:var(--osaka-lt);color:var(--osaka);}

  .container{max-width:1260px;margin:0 auto;padding:24px 20px;}

  .kpi-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .kpi{background:#fff;border-radius:10px;padding:14px 20px;flex:1;min-width:110px;box-shadow:0 1px 6px rgba(0,0,0,.07);display:flex;flex-direction:column;align-items:center;transition:transform .15s;}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12);}
  .kpi .n{font-size:30px;font-weight:800;line-height:1;}
  .kpi .l{font-size:11px;color:var(--text-2);margin-top:5px;text-align:center;}
  .ev-tokyo .kpi{border-top:3px solid var(--blue);}
  .ev-tokyo .kpi:nth-child(1) .n{color:var(--blue);}
  .ev-tokyo .kpi:nth-child(2) .n{color:var(--blue);}
  .ev-tokyo .kpi:nth-child(3) .n{color:#1a73e8;}
  .ev-tokyo .kpi:nth-child(4) .n{color:#137333;}
  .ev-tokyo .kpi:nth-child(5) .n{color:#b45309;}
  .ev-osaka .kpi{border-top:3px solid var(--osaka);}
  .ev-osaka .kpi:nth-child(1) .n{color:var(--osaka);}
  .ev-osaka .kpi:nth-child(2) .n{color:#00897b;}
  .ev-osaka .kpi:nth-child(3) .n{color:#1a73e8;}

  .json-toolbar{display:flex;gap:10px;align-items:center;background:#fff;border-radius:10px;padding:12px 18px;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);flex-wrap:wrap;}
  .toolbar-label{font-size:12px;font-weight:600;color:var(--text-2);margin-right:4px;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .15s;}
  .btn-success{background:#137333;color:#fff;}
  .btn-success:hover{background:#0d5226;}
  .btn-outline{background:#fff;color:var(--text);border:1.5px solid var(--gray-bd);}
  .ev-tokyo .btn-outline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}
  .ev-osaka .btn-outline:hover{border-color:var(--osaka);color:var(--osaka);background:var(--osaka-lt);}
  .import-status{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;display:none;}
  .import-status.ok{background:#dcfce7;color:#166534;display:inline-flex;}
  .import-status.err{background:#fee2e2;color:#991b1b;display:inline-flex;}
  .last-update{margin-left:auto;font-size:11px;color:var(--text-2);}

  .filter-bar{background:#fff;border-radius:10px;padding:14px 20px;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .filter-bar label{font-size:12px;font-weight:600;color:var(--text-2);}
  .filter-bar select,.filter-bar input{border:1px solid var(--gray-bd);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none;background:#fafbfc;color:var(--text);transition:border-color .15s;}
  .ev-tokyo .filter-bar select:focus,.ev-tokyo .filter-bar input:focus{border-color:var(--blue);}
  .ev-osaka .filter-bar select:focus,.ev-osaka .filter-bar input:focus{border-color:var(--osaka);}
  .filter-bar input{width:200px;}
  .filter-count{margin-left:auto;font-size:12px;color:var(--text-2);padding:4px 12px;border-radius:20px;font-weight:600;}
  .ev-tokyo .filter-count{background:var(--blue-lt);}
  .ev-osaka .filter-count{background:var(--osaka-lt);}

  .tab-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
  .tab{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;background:#fff;color:var(--text-2);box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .tab .badge-tab{background:rgba(255,255,255,.25);border-radius:12px;padding:1px 7px;font-size:11px;min-width:20px;text-align:center;}
  .tab:not(.active) .badge-tab{background:var(--gray-bg);color:var(--text-2);}
  .tab.active{color:#fff!important;border-color:transparent;}
  .ev-tokyo .tab:hover{background:var(--blue-lt);color:var(--blue);}
  .ev-osaka .tab:hover{background:var(--osaka-lt);color:var(--osaka);}
  .tab-all{background:var(--text);color:#fff!important;}
  .tab-all:hover{background:#333!important;color:#fff!important;}

  .table-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.08);overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{background:#1a1a2e;color:#fff;padding:12px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;user-select:none;white-space:nowrap;}
  thead th:hover{background:#2d2d4a;}
  thead th .sort-icon{opacity:.5;margin-left:4px;font-size:10px;}
  thead th.sorted .sort-icon{opacity:1;color:#60a5fa;}
  tbody tr{border-bottom:1px solid #f0f2f5;transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#f8f9fd;}
  td{padding:12px 16px;vertical-align:middle;}
  .td-company{font-weight:500;}
  .td-rep{display:flex;align-items:center;gap:8px;}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .td-cnt{text-align:center;}
  .clickable-count{cursor:pointer;font-weight:700;padding:3px 10px;border-radius:12px;display:inline-block;transition:all .15s;}
  .ev-tokyo .clickable-count{background:var(--blue-lt);color:var(--blue);}
  .ev-tokyo .clickable-count:hover{background:var(--blue);color:#fff;}
  .ev-osaka .clickable-count{background:var(--osaka-lt);color:var(--osaka);}
  .ev-osaka .clickable-count:hover{background:var(--osaka);color:#fff;}

  /* participation badges */
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;white-space:nowrap;}
  .badge-both{background:#fef3c7;color:#92400e;}
  .badge-day0{background:#dbeafe;color:#1e40af;}
  .badge-day1{background:#dcfce7;color:#166534;}

  /* Account Type badges */
  .at-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;white-space:nowrap;}
  .at-ent-adv{background:#1e3a5f;color:#fff;}
  .at-ent-plus{background:#1565c0;color:#fff;}
  .at-ent{background:#1976d2;color:#fff;}
  .at-bus-plus{background:#00695c;color:#fff;}
  .at-bus{background:#2e7d32;color:#fff;}
  .at-kusen-mi{background:#b71c1c;color:#fff;}
  .at-kusen-un{background:#e53935;color:#fff;}
  .at-target{background:#e65100;color:#fff;}
  .at-empty{color:var(--text-2);font-size:11px;}

  /* GROUP HEADER ROW */
  .group-header-row td{
    background:linear-gradient(90deg,#1a1a2e,#2d2d4a);
    color:#fff;font-weight:700;font-size:13px;padding:10px 16px;letter-spacing:.3px;
  }
  .ev-osaka .group-header-row td{background:linear-gradient(90deg,#7d2d00,#a04000);}
  .group-rep-name{font-size:14px;font-weight:800;}
  .group-stat{display:inline-flex;align-items:center;gap:4px;margin-left:16px;font-size:12px;font-weight:600;opacity:.9;background:rgba(255,255,255,.15);border-radius:12px;padding:2px 10px;}
  .group-stat .stat-icon{font-size:13px;}

  /* modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:16px;max-width:560px;width:90%;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
  .modal-header{padding:18px 24px 14px;display:flex;align-items:flex-start;gap:12px;}
  .ev-tokyo .modal-header{border-bottom:3px solid var(--blue);}
  .ev-osaka .modal-header{border-bottom:3px solid var(--osaka);}
  .modal-company{font-size:17px;font-weight:800;flex:1;}
  .modal-sub{font-size:12px;color:var(--text-2);margin-top:3px;}
  .modal-close{font-size:22px;cursor:pointer;color:var(--text-2);padding:0 4px;}
  .modal-body{overflow-y:auto;padding:16px 24px 20px;}
  .att-card{display:flex;flex-direction:column;gap:2px;padding:10px 14px;border-radius:8px;background:#f8f9fd;margin-bottom:8px;}
  .att-name{font-weight:700;font-size:13px;}
  .att-meta{font-size:11px;color:var(--text-2);}
  .att-badges{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
  .empty{text-align:center;padding:48px;color:var(--text-2);font-size:14px;}

  /* ===== PASSWORD AUTH OVERLAY ===== */
  #auth-overlay{
    position:fixed;inset:0;z-index:9999;
    background:linear-gradient(135deg,#003c84 0%,#0061d5 60%,#1a73e8 100%);
    display:flex;align-items:center;justify-content:center;
  }
  #auth-box{
    background:#fff;border-radius:16px;padding:48px 40px;width:360px;max-width:90vw;
    box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center;
  }
  #auth-box .auth-logo{font-size:22px;font-weight:800;color:#003c84;margin-bottom:4px;letter-spacing:-.5px;}
  #auth-box .auth-sub{font-size:12px;color:#5f6368;margin-bottom:32px;}
  #auth-box .auth-label{font-size:12px;font-weight:600;color:#5f6368;text-align:left;margin-bottom:6px;display:block;}
  #auth-input{
    width:100%;padding:12px 16px;border:2px solid #dde1e7;border-radius:8px;
    font-size:16px;font-family:inherit;outline:none;transition:border-color .15s;
    text-align:center;letter-spacing:2px;
  }
  #auth-input:focus{border-color:#0061d5;}
  #auth-btn{
    width:100%;margin-top:16px;padding:13px;background:#0061d5;color:#fff;
    border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;
    cursor:pointer;transition:background .15s;
  }
  #auth-btn:hover{background:#003c84;}
  #auth-error{color:#c62828;font-size:12px;margin-top:10px;display:none;font-weight:600;}
  #app-wrap{display:none;}


  /* ===== CCO SECTION STYLES ===== */
  #cco-section{display:none;background:var(--gray-bg);min-height:calc(100vh - 112px);}
  .cco-kpi-strip{background:#fff;border-bottom:1px solid #e0e4ea;padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;}
  .cco-kpi{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:8px;border:1.5px solid #e0e4ea;flex:1;min-width:90px;}
  .cco-kpi.k-sanka{border-color:#86efac;background:#f0fdf4;}
  .cco-kpi.k-ng{border-color:#fca5a5;background:#fff5f5;}
  .cco-kpi.k-yotei{border-color:#93c5fd;background:#eff6ff;}
  .cco-kpi.k-kaito{border-color:#fcd34d;background:#fffbeb;}
  .cco-kpi.k-mi{border-color:#d1d5db;background:#fafafa;}
  .cco-kpi.k-other{border-color:#c4b5fd;background:#faf5ff;}
  .cco-kpi-n{font-size:26px;font-weight:800;line-height:1;}
  .cco-kpi-n.g{color:#16a34a}.cco-kpi-n.r{color:#dc2626}.cco-kpi-n.b{color:#1d4ed8}
  .cco-kpi-n.a{color:#d97706}.cco-kpi-n.gr{color:#6b7280}.cco-kpi-n.p{color:#7c3aed}
  .cco-kpi-lbl{font-size:11px;color:#666;line-height:1.3;}
  .cco-toolbar{background:#fff;border-bottom:1px solid #e0e4ea;padding:8px 20px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .cco-fbar{background:#f5f7fa;border-bottom:1px solid #e0e4ea;padding:7px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .cco-fl{font-size:11px;color:#888;white-space:nowrap;}
  .cco-fsel{padding:4px 8px;border:1.5px solid #e0e4ea;border-radius:6px;font-size:11px;background:#fff;outline:none;color:#333;cursor:pointer;}
  .cco-fsel:focus{border-color:var(--cco);}
  .cco-fsrch{padding:4px 8px;border:1.5px solid #e0e4ea;border-radius:6px;font-size:11px;outline:none;width:140px;}
  .cco-fsrch:focus{border-color:var(--cco);}
  .cco-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;padding:14px 20px 48px;max-width:1400px;margin:0 auto;}
  .ae-card{background:#fff;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.08);overflow:hidden;}
  .ae-hdr{padding:9px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
  .ae-nm{font-size:13px;font-weight:800;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ae-chips{display:flex;gap:4px;flex-wrap:wrap;}
  .ae-chip{font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;background:rgba(255,255,255,.22);color:#fff;white-space:nowrap;}
  .ae-arr{color:rgba(255,255,255,.55);font-size:11px;margin-left:4px;transition:.2s;flex-shrink:0;}
  .ae-card.col .ae-arr{transform:rotate(-90deg);}
  .ae-card.col .ae-body{display:none;}
  .ae-body{border-top:1px solid #f0f2f5;}
  .cco-sec{border-bottom:1px solid #f3f5f7;}
  .cco-sec:last-child{border-bottom:none;}
  .cco-sec-hdr{display:flex;align-items:center;gap:6px;padding:7px 13px 5px;background:#fafbfc;}
  .cco-sec-lbl{font-size:11px;font-weight:700;}
  .cco-sec-cnt{font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;margin-left:2px;}
  .s-sanka .cco-sec-lbl{color:#15803d} .s-sanka .cco-sec-cnt{background:#dcfce7;color:#15803d}
  .s-ng    .cco-sec-lbl{color:#b91c1c} .s-ng    .cco-sec-cnt{background:#fee2e2;color:#b91c1c}
  .s-yotei .cco-sec-lbl{color:#1d4ed8} .s-yotei .cco-sec-cnt{background:#dbeafe;color:#1d4ed8}
  .s-kaito .cco-sec-lbl{color:#92400e} .s-kaito .cco-sec-cnt{background:#fef9c3;color:#92400e}
  .s-mi    .cco-sec-lbl{color:#374151} .s-mi    .cco-sec-cnt{background:#f3f4f6;color:#6b7280}
  .s-other .cco-sec-lbl{color:#6d28d9} .s-other .cco-sec-cnt{background:#ede9fe;color:#6d28d9}
  .co-list{padding:3px 13px 8px;}
  .co-row{padding:5px 0;border-bottom:1px solid #f6f7f9;}
  .co-row:last-child{border-bottom:none;}
  .co-nm{font-size:12px;font-weight:600;color:#1e3a5f;line-height:1.4;display:block;margin-bottom:2px;}
  .co-meta{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;margin-top:2px;}
  .co-date{font-size:10px;font-weight:600;padding:1px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
  .date-ok{background:#dbeafe;color:#1d4ed8;}
  .date-past{background:#fee2e2;color:#b91c1c;}
  .co-cmt{font-size:11px;color:#555;background:#f5f6f8;padding:2px 8px;border-radius:4px;line-height:1.5;flex:1;min-width:0;word-break:break-all;}
  .co-none{font-size:10px;color:#ccc;padding:3px 0 6px;}

</style>
</head>
<body>

<div id="auth-overlay">
  <div id="auth-box">
    <div class="auth-logo">BoxWorks 2026</div>
    <div class="auth-sub">エリア営業1部 参加者ダッシュボード</div>
    <label class="auth-label" for="auth-input">パスワード</label>
    <input type="password" id="auth-input" placeholder="••••••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <button id="auth-btn" onclick="checkAuth()">ログイン</button>
    <div id="auth-error">パスワードが正しくありません</div>
  </div>
</div>
<div id="app-wrap">

<div class="topnav ev-tokyo" id="topnav">
  <div class="logo">BoxWorks 2026<span>エリア営業1部 参加者ダッシュボード</span></div>
  <div class="date">更新: 2026/05/16 02:31</div>
</div>

<div class="event-switcher">
  <div class="event-tab active-tokyo" id="tab-tokyo" onclick="switchEvent('tokyo')">
    🗼 BoxWorks Tokyo 2026 <span class="ev-badge tk">DAY0/DAY1</span>
  </div>
  <div class="event-tab" id="tab-osaka" onclick="switchEvent('osaka')">
    🏯 BoxWorks Osaka 2026 <span class="ev-badge os">大阪</span>
  </div>
  <div class="event-tab" id="tab-cco" onclick="switchEvent('cco')">
    🎤 CIO Connect Osaka <span class="ev-badge cc">集客状況</span>
  </div>
</div>

<div class="container ev-tokyo" id="main-container">
  <div class="kpi-bar" id="kpi-bar"></div>
  <div class="json-toolbar">
    <span class="toolbar-label">📥 JSON</span>
    <label class="btn btn-success" style="cursor:pointer;">
      ⬆ インポート
      <input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
    </label>
    <button class="btn btn-outline" onclick="exportJSON()">⬇ エクスポート</button>
    <button class="btn btn-outline" onclick="exportSchema()">📋 スキーマ</button>
    <span class="import-status" id="import-status"></span>
    <span class="last-update" id="last-update">最終更新: 2026/05/16 02:31</span>
  </div>
  <div class="filter-bar" id="filter-bar">
    <label>🔍 担当営業</label>
    <select id="rep-sel" onchange="applyFilters()"><option value="">全員</option></select>
    <div id="part-filter-wrap"></div>
    <label>Account Type</label>
    <select id="at-sel" onchange="applyFilters()"><option value="">全て</option></select>
    <label>🏢 会社名</label>
    <input id="company-input" type="text" placeholder="絞り込み…" oninput="applyFilters()">
    <span class="filter-count" id="filter-count"></span>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="table-wrap">
    <table id="main-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner">
    <div class="modal-header" id="modal-header">
      <div>
        <div class="modal-company" id="modal-company"></div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>

  // ===== PASSWORD AUTH =====
  const BWT_KEY = 'bwt_auth';
  const BWT_PASS = '¥1103737712';
  function checkAuth(){
    const v = document.getElementById('auth-input').value;
    if(v === BWT_PASS){

const DATA = {

  osaka: JSON.parse(JSON.stringify(EVENTS.osaka.raw))
};

let currentEvent = 'tokyo';
let sortKey = 'owner_jp';
let sortAsc = true;

const REP_COLORS = {
  '川島 有貴':'#0061d5','松永 祐依':'#7c3aed','守木 誠':'#059669',
  '大住 健太郎':'#d97706','桜井 康之':'#db2777','菅 和樹':'#0891b2','嶋津 修':'#9333ea',
  '嶋津 早希子':'#9333ea','桜井 章雄':'#db2777','森木 勇太':'#059669'
};
function repColor(name){ return REP_COLORS[name]||'#6b7280'; }

function atBadge(at){
  if(!at) return '<span class="at-empty">—</span>';
  const map = {
    'Enterprise Advanced':'at-ent-adv','Enterprise Plus':'at-ent-plus',
    'Enterprise':'at-ent','Business Plus':'at-bus-plus','Business':'at-bus',
    '苦戦【未商談】':'at-kusen-mi','苦戦【コンタクト不明】':'at-kusen-un'
  };
  // Target types
  let cls = 'at-target';
  if(map[at]) cls = map[at];
  return `<span class="at-badge ${cls}">${at}</span>`;
}

function switchEvent(evt){
  currentEvent = evt;
  const isCco = (evt==='cco');
  const c = document.getElementById('main-container');
  const ccoSec = document.getElementById('cco-section');
  if(isCco){
    c.style.display='none';
    ccoSec.style.display='block';
  } else {
    c.style.display='';
    ccoSec.style.display='none';
    c.className = 'container ev-'+evt;
    document.getElementById('modal-inner').className = 'modal ev-'+evt;
    sortKey='owner_jp'; sortAsc=true;
    renderKPIBar(evt);
    renderTableHead(evt);
    renderPartFilter(evt);
    buildAtFilter();
    buildTabs();
    applyFilters();
  }
  document.getElementById('topnav').className = 'topnav ev-'+evt;
  document.getElementById('tab-tokyo').className = 'event-tab'+(evt==='tokyo'?' active-tokyo':'');
  document.getElementById('tab-osaka').className = 'event-tab'+(evt==='osaka'?' active-osaka':'');
  document.getElementById('tab-cco').className   = 'event-tab'+(evt==='cco'  ?' active-cco':'');
  if(isCco) ccoRender();
}

function renderKPIBar(evt){
  const d=DATA[evt];
  const companies=d.length;
  const attendees=d.reduce((s,r)=>s+r.count,0);
  const bar=document.getElementById('kpi-bar');
  if(evt==='tokyo'){
    const day0=d.reduce((s,r)=>s+r.attendees.filter(a=>a.day0).length,0);
    const day1=d.reduce((s,r)=>s+r.attendees.filter(a=>a.day1).length,0);
    const both=d.reduce((s,r)=>s+r.attendees.filter(a=>a.day0&&a.day1).length,0);
    bar.innerHTML=`
      <div class="kpi"><div class="n">${companies}</div><div class="l">顧客数</div></div>
      <div class="kpi"><div class="n">${attendees}</div><div class="l">登録人数</div></div>
      <div class="kpi"><div class="n">${day0}</div><div class="l">🌐 DAY0</div></div>
      <div class="kpi"><div class="n">${day1}</div><div class="l">🏛 DAY1</div></div>
      <div class="kpi"><div class="n">${both}</div><div class="l">🔁 両日</div></div>`;
  } else {
    const reps=new Set(d.map(r=>r.owner_jp)).size;
    bar.innerHTML=`
      <div class="kpi"><div class="n">${companies}</div><div class="l">顧客数</div></div>
      <div class="kpi"><div class="n">${attendees}</div><div class="l">登録人数</div></div>
      <div class="kpi"><div class="n">${reps}</div><div class="l">担当営業数</div></div>`;
  }
}

function renderTableHead(evt){
  const th=document.getElementById('table-head');
  if(evt==='tokyo'){
    th.innerHTML=`<tr>

function buildAtFilter(){
  const d=DATA[currentEvent];
  const types=[...new Set(d.map(r=>r.accountType||'').filter(Boolean))].sort();
  const sel=document.getElementById('at-sel');
  const cur=sel.value;
  sel.innerHTML='<option value="">全て</option>';

    opt.value=t; opt.textContent=t;
    sel.appendChild(opt);
  });

function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      if(!Array.isArray(imported)) throw new Error('配列ではありません');
      DATA[currentEvent]=imported;
      const s=document.getElementById('import-status');
      s.textContent='✓ '+imported.length+'件インポート完了';
      s.className='import-status ok';
      document.getElementById('last-update').textContent='最終更新: '+new Date().toLocaleString('ja-JP');
      buildAtFilter(); buildTabs(); applyFilters(); renderKPIBar(currentEvent);
    }catch(err){
      const s=document.getElementById('import-status');
      s.textContent='✗ エラー: '+err.message;
      s.className='import-status err';
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

function buildTabs(){
  const d=DATA[currentEvent];
  const repSel=document.getElementById('rep-sel');
  const cur=repSel.value;
  const reps=[...new Set(d.map(r=>r.owner_jp))].sort();
  repSel.innerHTML='<option value="">全員</option>';
  reps.forEach(r=>{
    const cnt=d.filter(x=>x.owner_jp===r).length;
    const opt=document.createElement('option');
    opt.value=r; opt.textContent=r+' ('+cnt+'社)';
    repSel.appendChild(opt);
  });
  if(cur) repSel.value=cur;
  const bar=document.getElementById('tab-bar');
  const total=d.reduce((s,r)=>s+r.count,0);
  bar.innerHTML=`<div class="tab tab-all active" onclick="setTab('')"><span>全員</span><span class="badge-tab">${total}名</span></div>`;
  reps.forEach(r=>{
    const att=d.filter(x=>x.owner_jp===r).reduce((s,x)=>s+x.count,0);
    const col=repColor(r);
    bar.innerHTML+=`<div class="tab" onclick="setTab('${r}')" style="border-color:${col}20;" data-rep="${r}">
      <span class="dot" style="background:${col}"></span><span>${r}</span>
      <span class="badge-tab">${att}名</span></div>`;
  });
}

function setTab(rep){
  document.querySelectorAll('#tab-bar .tab').forEach(t=>{t.classList.remove('active');t.style.background='';t.style.color='';} );
  const clicked=rep===''?document.querySelector('.tab-all'):[...document.querySelectorAll('#tab-bar .tab')].find(t=>t.dataset.rep===rep);
  if(clicked){
    clicked.classList.add('active');
    if(rep){const col=repColor(rep);clicked.style.background=col;clicked.style.color='#fff';}
  }
  document.getElementById('rep-sel').value=rep;
  applyFilters();
}

function applyFilters(){
  let d=[...DATA[currentEvent]];
  const rep=document.getElementById('rep-sel').value;
  const company=document.getElementById('company-input').value.toLowerCase();
  const partSel=document.getElementById('part-sel');
  const part=partSel?partSel.value:'';
  const atVal=document.getElementById('at-sel').value;

  if(rep) d=d.filter(r=>r.owner_jp===rep);
  if(company) d=d.filter(r=>r.company.toLowerCase().includes(company));
  if(atVal) d=d.filter(r=>(r.accountType||'')===atVal);
  if(part) d=d.filter(r=>{
    const p=r.participation||'';
    if(part==='DAY0') return p==='DAY0';
    if(part==='DAY1') return p==='DAY1';
    if(part==='DAY0+DAY1') return p==='DAY0+DAY1';
    return true;
  });

  d.sort((a,b)=>{
    let av,bv;
    if(sortKey==='day0c'){av=a.attendees.filter(x=>x.day0).length;bv=b.attendees.filter(x=>x.day0).length;}
    else if(sortKey==='day1c'){av=a.attendees.filter(x=>x.day1).length;bv=b.attendees.filter(x=>x.day1).length;}
    else{av=a[sortKey]||'';bv=b[sortKey]||'';}
    if(typeof av==='number')return sortAsc?av-bv:bv-av;
    return sortAsc?(av<bv?-1:av>bv?1:0):(av<bv?1:av>bv?-1:0);
  });

  const total=d.reduce((s,r)=>s+r.count,0);
  document.getElementById('filter-count').textContent=d.length+'社 / '+total+'名';
  renderTable(d);
  updateKPI(d);
}

function updateKPI(d){
  const bar=document.getElementById('kpi-bar');
  const ns=bar.querySelectorAll('.n');
  if(!ns.length) return;
  ns[0].textContent=d.length;
  ns[1].textContent=d.reduce((s,r)=>s+r.count,0);
  if(currentEvent==='tokyo'&&ns.length>=5){
    ns[2].textContent=d.reduce((s,r)=>s+r.attendees.filter(a=>a.day0).length,0);
    ns[3].textContent=d.reduce((s,r)=>s+r.attendees.filter(a=>a.day1).length,0);
    ns[4].textContent=d.reduce((s,r)=>s+r.attendees.filter(a=>a.day0&&a.day1).length,0);
  }else if(currentEvent==='osaka'&&ns.length>=3){
    ns[2].textContent=new Set(d.map(r=>r.owner_jp)).size;
  }
}

function renderTable(d){
  const tbody=document.getElementById('table-body');
  if(!d.length){tbody.innerHTML='<tr><td colspan="10" class="empty">データなし</td></tr>';return;}
  const isT=currentEvent==='tokyo';
  const groupByRep=(sortKey==='owner_jp');
  let html='', currentRep=null;

  if(groupByRep){
    d.forEach(row=>{
      const rep=row.owner_jp;
      if(rep!==currentRep){
        const repRows=d.filter(r=>r.owner_jp===rep);
        const repAtt=repRows.reduce((s,r)=>s+r.count,0);
        const col=repColor(rep);
        let statsHtml='';
        if(isT){
          const d0=repRows.reduce((s,r)=>s+r.attendees.filter(a=>a.day0).length,0);
          const d1=repRows.reduce((s,r)=>s+r.attendees.filter(a=>a.day1).length,0);
          statsHtml=`<span class="group-stat"><span class="stat-icon">🌐</span> DAY0: ${d0}名</span>
            <span class="group-stat"><span class="stat-icon">🏛</span> DAY1: ${d1}名</span>
            <span class="group-stat"><span class="stat-icon">👥</span> 合計: ${repAtt}名 (${repRows.length}社)</span>`;
        }else{
          statsHtml=`<span class="group-stat"><span class="stat-icon">👥</span> 合計: ${repAtt}名 (${repRows.length}社)</span>`;
        }
        const colspan=isT?7:4;
        html+=`<tr class="group-header-row"><td colspan="${colspan}">
          <span class="dot" style="background:${col};width:10px;height:10px;display:inline-block;border-radius:50%;margin-right:8px;vertical-align:middle;"></span>
          <span class="group-rep-name">${rep}</span>${statsHtml}</td></tr>`;
        currentRep=rep;
      }
      html+=buildRow(row,isT);
    });
  }else{
    d.forEach(row=>{html+=buildRow(row,isT);});
  }
  tbody.innerHTML=html;
}

function buildRow(row,isT){
  const idx=DATA[currentEvent].indexOf(row);
  const col=repColor(row.owner_jp);
  const at=atBadge(row.accountType||'');
  if(isT){
    const d0c=row.attendees.filter(a=>a.day0).length;
    const d1c=row.attendees.filter(a=>a.day1).length;
    const part=row.participation||'';
    const badge=part==='DAY0+DAY1'?'<span class="badge badge-both">🔁 両日</span>':
                 part==='DAY0'?'<span class="badge badge-day0">🌐 DAY0</span>':
                 part==='DAY1'?'<span class="badge badge-day1">🏛 DAY1</span>':'';
    return `<tr>
      <td><div class="td-rep"><span class="dot" style="background:${col}"></span>${row.owner_jp}</div></td>
      <td class="td-company">${row.company}</td>
      <td>${at}</td>
      <td class="td-cnt"><span class="clickable-count" onclick="openModal(${idx})">${row.count}名</span></td>
      <td>${badge}</td>
      <td class="td-cnt">${d0c>0?d0c:'—'}</td>
      <td class="td-cnt">${d1c>0?d1c:'—'}</td>
    </tr>`;
  }else{
    return `<tr>
      <td><div class="td-rep"><span class="dot" style="background:${col}"></span>${row.owner_jp}</div></td>
      <td class="td-company">${row.company}</td>
      <td>${at}</td>
      <td class="td-cnt"><span class="clickable-count" onclick="openModal(${idx})">${row.count}名</span></td>
    </tr>`;
  }
}

function sortBy(key){
  if(sortKey===key){sortAsc=!sortAsc;}else{sortKey=key;sortAsc=true;}
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.remove('sorted');
    const icon=th.querySelector('.sort-icon');
    if(icon)icon.textContent='↕';
  });
  const keyMap={owner_jp:0,company:1,accountType:2,count:3};
  const tokyoMap={owner_jp:0,company:1,accountType:2,count:3,day0c:5,day1c:6};
  const m=currentEvent==='tokyo'?tokyoMap:keyMap;
  const idx=m[key];
  if(idx!==undefined){
    const ths=document.querySelectorAll('thead th');
    if(ths[idx]){ths[idx].classList.add('sorted');const ic=ths[idx].querySelector('.sort-icon');if(ic)ic.textContent=sortAsc?'↑':'↓';}
  }
  applyFilters();
}

function openModal(idx){
  const row=DATA[currentEvent][idx];
  if(!row)return;
  const col=repColor(row.owner_jp);
  document.getElementById('modal-company').textContent=row.company;
  document.getElementById('modal-sub').innerHTML=row.owner_jp+' ｜ '+row.count+'名'+(row.accountType?'  '+atBadge(row.accountType):'');
  document.getElementById('modal-header').style.borderBottomColor=col;
  const isT=currentEvent==='tokyo';
  let bodyHtml='';
  row.attendees.forEach(a=>{
    let badges='';
    if(isT){
      if(a.day0)badges+='<span class="badge badge-day0">🌐 DAY0</span>';
      if(a.day1)badges+='<span class="badge badge-day1">🏛 DAY1</span>';
    }
    bodyHtml+=`<div class="att-card">
      <div class="att-name">${a.name||'（氏名なし）'}</div>
      <div class="att-meta">${[a.title,a.dept].filter(Boolean).join(' ／ ')}</div>
      ${badges?`<div class="att-badges">${badges}</div>`:''}</div>`;
  });
  document.getElementById('modal-body').innerHTML=bodyHtml||'<div class="empty">参加者情報なし</div>';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

const CCO_COLORS=['#f97316','#7c3aed','#2563eb','#059669','#db2777','#16a34a','#0284c7','#b45309','#0d9488','#4f46e5'];
const CCO_CMAP={};
const CCO_TODAY=new Date('2026-05-18');
let ccoStore=null;
const CCO_LS='cco_bwt_v1';

function ccoAeColor(n){if(!CCO_CMAP[n])CCO_CMAP[n]=CCO_COLORS[Object.keys(CCO_CMAP).length%CCO_COLORS.length];return CCO_CMAP[n];}

function ccoInit(){
  try{const s=localStorage.getItem(CCO_LS);if(s)ccoStore=JSON.parse(s);}catch(e){}
  if(!ccoStore)ccoStore={sections:CCO_INITIAL,meta:{importedAt:'初期データ'}};
}

function ccoImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      ccoStore={sections:p.sections||p,meta:{importedAt:new Date().toLocaleString('ja-JP'),fileName:file.name}};
      localStorage.setItem(CCO_LS,JSON.stringify(ccoStore));
      ccoRender();
    }catch(err){alert('読み込み失敗: '+err.message);}
    e.target.value='';
  };
  r.readAsText(file,'UTF-8');
}

function ccoExport(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(ccoStore.sections||ccoStore,null,2)],{type:'application/json'}));
  a.download='area1_cco_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.json';
  a.click();
}

function ccoFlat(){
  const s=ccoStore.sections||ccoStore,list=[];
  for(const[sec,accs]of Object.entries(s)){if(Array.isArray(accs))accs.forEach(a=>list.push({...a,_sec:sec}));}
  return list;
}

function ccoCatOf(v){
  if(!v||!v.trim()||v==='X')return'blank';
  if(v==='参加')return'参加';
  if(v.startsWith('NG'))return'NG';
  if(v.startsWith('案内予定'))return'案内予定';
  if(v.startsWith('回答待ち'))return'回答待ち';
  if(v.startsWith('未案内'))return'未案内';
  if(v.startsWith('その他'))return'その他';
  return'その他';
}

function ccoExtractParen(cco){
  const m=(cco||'').match(/（([\s\S]+?)）/);
  return m?m[1]:'';
}

function ccoIsDateStr(s){
  return /^\d{4}\/\d{1,2}\/\d{1,2}$/.test(s)||/^\d{1,2}\/\d{1,2}$/.test(s);
}

function ccoParseDate(s){
  if(/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(s)){const[y,m,d]=s.split('/');return new Date(+y,+m-1,+d);}
  if(/^\d{1,2}\/\d{1,2}$/.test(s)){const[m,d]=s.split('/');return new Date(2026,+m-1,+d);}
  return null;
}

function ccoRender(){
  if(!ccoStore)ccoInit();
  const all=ccoFlat();
  const ts=ccoStore.meta?.importedAt||'';
  document.getElementById('cco-ts').textContent=ts?'最終更新: '+ts:'';

  const tots={参加:0,NG:0,案内予定:0,回答待ち:0,未案内:0,その他:0};

    const byCat={};CATS.forEach(c=>byCat[c.k]=[]);
    accounts.forEach(a=>{const c=ccoCatOf(a.cco);if(byCat[c]!==undefined)byCat[c].push(a);});

    const secsHtml=CATS.map(({k,lbl,cls})=>{
      const items=byCat[k]||[];
      if(!items.length)return`<div class="cco-sec"><div class="cco-sec-hdr ${cls}"><span class="cco-sec-lbl">${lbl}</span><span class="cco-sec-cnt">0社</span></div><div class="co-list"><div class="co-none">—</div></div></div>`;
      const rowsHtml=items.map(a=>{
        const inner=ccoExtractParen(a.cco);
        let dateHtml='',cmtHtml='';
        if(k==='案内予定'&&inner){
          if(ccoIsDateStr(inner)){
            const d=ccoParseDate(inner);
            const past=d&&d<CCO_TODAY;
            dateHtml=`<span class="co-date ${past?'date-past':'date-ok'}">📅 ${inner}${past?' ⚠ 期限超過':''}</span>`;
          }else{
            cmtHtml=`<span class="co-cmt">${inner}</span>`;
          }
        }else if(inner){
          cmtHtml=`<span class="co-cmt">${inner}</span>`;
        }
        const metaHtml=(dateHtml||cmtHtml)?`<div class="co-meta">${dateHtml}${cmtHtml}</div>`:'';
        return`<div class="co-row"><span class="co-nm">${a.account}</span>${metaHtml}</div>`;
      }).join('');
      return`<div class="cco-sec"><div class="cco-sec-hdr ${cls}"><span class="cco-sec-lbl">${lbl}</span><span class="cco-sec-cnt">${items.length}社</span></div><div class="co-list">${rowsHtml}</div></div>`;
    }).join('');

    html+=`<div class="ae-card">
      <div class="ae-hdr" style="background:${color}" onclick="this.closest('.ae-card').classList.toggle('col')">
        <span class="ae-nm">${ae}</span>
        <div class="ae-chips">${chips}</div>
        <span class="ae-arr">▼</span>
      </div>
      <div class="ae-body">${secsHtml}</div>
    </div>`;
  });

  document.getElementById('cco-grid').innerHTML=html||'<div style="grid-column:1/-1;text-align:center;padding:60px;color:#aaa">該当データがありません</div>';
}

ccoInit();
// ===== END CIO Connect Osaka =====

switchEvent('tokyo');
</script>

    <button class="btn btn-outline" onclick="ccoExport()">⬇ エクスポート</button>
    <span class="last-update" id="cco-ts"></span>
  </div>
  <div class="cco-fbar">
    <span class="cco-fl">担当</span>
    <select class="cco-fsel" id="cco-f-rep" onchange="ccoRender()"><option value="all">全員</option></select>

    <select class="cco-fsel" id="cco-f-st" onchange="ccoRender()">
      <option value="all">全て</option>
      <option value="参加">参加</option>

  </div>
  <div class="cco-grid" id="cco-grid"></div>
</div>
