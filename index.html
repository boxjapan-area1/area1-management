<div id="auth-overlay" style="position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:99999;">
  <div style="background:white;border-radius:16px;border:0.5px solid #e0ddd5;padding:40px 36px;text-align:center;max-width:360px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,.08);">

      onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="auth-error" style="color:#A32D2D;font-size:12px;margin-bottom:10px;min-height:16px;"></div>
    <button onclick="checkAuth()"
      style="width:100%;padding:11px;background:#1a1a1a;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">

<script>
(function(){
  if(sessionStorage.getItem('pm_auth')==='ok'){
    document.getElementById('auth-overlay').style.display='none';
  }
})();
function checkAuth(){
  var pw=document.getElementById('auth-input').value;
  if(pw==='¥1103737712'){
    sessionStorage.setItem('pm_auth','ok');
    document.getElementById('auth-overlay').style.display='none';
    // moduleスコープのstartListenerをカスタムイベント経由で呼ぶ
    document.dispatchEvent(new CustomEvent('pm-auth-ok'));
  } else {
    document.getElementById('auth-error').textContent='パスワードが正しくありません';
    document.getElementById('auth-input').value='';
    document.getElementById('auth-input').focus();
  }
}
</script>

function debounce(key,fn,ms=800){clearTimeout(debounceTimers[key]);debounceTimers[key]=setTimeout(fn,ms);}

  {id:1,name:'Sales Enablement DGフェーズの件（マップは後日）',status:'未着手',date:'',na:'',naOwner:'',naDate:'',notes:'',done:false},

let projects=[],currentFilter='all',statusTargetId=null,editingModalId=null,sortKey=null,sortDir='asc';
const STATUS_ORDER={'進行中':0,'未着手':1,'完了':2};
function startListener(){setSyncBadge('saving','接続中…');const q=query(COLL,orderBy('createdAt','asc'));unsubscribeSnapshot=onSnapshot(q,snap=>{projects=snap.docs.map(d=>({id:d.id,...d.data()}));setSyncBadge('notion','Firebase同期中');checkDuplicates();render();},err=>{setSyncBadge('error','接続失敗');console.error(err);});}
// seedDefaults()は廃止（重複追加の原因のため削除）
async function seedDefaults(){console.warn('seedDefaults: 無効化済み（重複防止）');}

// ── 重複チェック＆削除 ─────────────────────────────────
function checkDuplicates(){
  const names={};
  projects.forEach(p=>{ names[p.name]=(names[p.name]||0)+1; });
  const hasDup=Object.values(names).some(c=>c>1);
  const btn=document.getElementById('btn-dedup');
  if(btn) btn.style.display=hasDup?'':'none';
}
async function deduplicateProjects(){
  const names={};
  projects.forEach(p=>{ if(!names[p.name]||names[p.name].createdAt.seconds>p.createdAt.seconds) names[p.name]=p; });
  const keepIds=new Set(Object.values(names).map(p=>p.id));
  const toDelete=projects.filter(p=>!keepIds.has(p.id));
  if(toDelete.length===0){alert('重複はありません');return;}
  if(!confirm(`重複 ${toDelete.length} 件を削除します。よろしいですか？`))return;
  setSyncBadge('saving','削除中…');
  let failCount=0;
  for(const p of toDelete){
    try {
      const {deleteDoc:dd, doc:dc}=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
      await dd(dc(db,'projects',p.id));
    } catch(e){ failCount++; console.error('削除失敗:',p.name,e); }
  }
  if(failCount>0){
    setSyncBadge('error','削除失敗');
    alert(`${failCount}件の削除に失敗しました。\nFirebaseコンソールから手動削除が必要な場合があります。\nhttps://console.firebase.google.com`);
  } else {
    setSyncBadge('notion','Firebase同期中');
    document.getElementById('btn-dedup').style.display='none';
  }
}
async function fsUpdate(id,data){setSyncBadge('saving','保存中…');try{await updateDoc(doc(db,'projects',id),data);setSyncBadge('notion','Firebase同期中');}catch(e){setSyncBadge('error','保存失敗');}}
async function fsDelete(id){setSyncBadge('saving','削除中…');try{await deleteDoc(doc(db,'projects',id));setSyncBadge('notion','Firebase同期中');}catch(e){setSyncBadge('error','削除失敗');}}
async function fsAdd(data){setSyncBadge('saving','保存中…');try{await addDoc(COLL,{...data,createdAt:serverTimestamp()});setSyncBadge('notion','Firebase同期中');}catch(e){setSyncBadge('error','保存失敗');}}
function setFilter(val,el){currentFilter=val;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');render();}
function sortBy(key){sortDir=(sortKey===key&&sortDir==='asc')?'desc':'asc';sortKey=key;document.querySelectorAll('.sortable').forEach(th=>{th.classList.remove('sort-asc','sort-desc');th.querySelector('.sort-icon').textContent='↕';});const thMap={name:'th-name',status:'th-status',date:'th-date',na:'th-na',naOwner:'th-owner',naDate:'th-nadate'};if(thMap[key]){const th=document.getElementById(thMap[key]);th.classList.add(sortDir==='asc'?'sort-asc':'sort-desc');th.querySelector('.sort-icon').textContent=sortDir==='asc'?'↑':'↓';}render();}
function applySortFilter(arr){let r=currentFilter==='all'?[...arr]:arr.filter(p=>p.status===currentFilter);if(!sortKey)return r;return r.sort((a,b)=>{let va,vb;if(sortKey==='status'){va=STATUS_ORDER[a.status]??99;vb=STATUS_ORDER[b.status]??99;return sortDir==='asc'?va-vb:vb-va;}if(sortKey==='date'||sortKey==='naDate'){va=a[sortKey]||'9999';vb=b[sortKey]||'9999';}else{va=(a[sortKey]||'').toLowerCase();vb=(b[sortKey]||'').toLowerCase();}return va<vb?(sortDir==='asc'?-1:1):va>vb?(sortDir==='asc'?1:-1):0;});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dateLabel(ds){if(!ds)return'';const d=new Date(ds+'T00:00:00'),today=new Date();today.setHours(0,0,0,0);const diff=Math.round((d-today)/86400000),lbl=`${d.getMonth()+1}/${d.getDate()}`;if(diff<0)return`<span class="date-tag overdue">⚠ ${lbl}</span>`;if(diff<=7)return`<span class="date-tag soon">${lbl} (${diff===0?'今日':diff+'日後'})</span>`;return`<span class="date-tag ok">${lbl}</span>`;}
function dateLabelText(ds){if(!ds)return null;const d=new Date(ds+'T00:00:00'),today=new Date();today.setHours(0,0,0,0);const diff=Math.round((d-today)/86400000),lbl=`${d.getMonth()+1}/${d.getDate()}`;if(diff<0)return{text:`⚠ ${lbl}`,cls:'overdue'};if(diff<=7)return{text:`${lbl} (${diff===0?'今日':diff+'日後'})`,cls:'soon'};return{text:lbl,cls:'ok'};}
function statusIcon(s){if(s==='進行中')return'🔵';if(s==='完了')return'✅';return'⬜';}
function render(){renderDesktop();renderMobile();document.getElementById('stat-all').textContent=projects.length;document.getElementById('stat-progress').textContent=projects.filter(p=>p.status==='進行中').length;document.getElementById('stat-done').textContent=projects.filter(p=>p.status==='完了').length;document.getElementById('project-count').textContent=`${projects.length}件`;}
function renderDesktop(){const list=document.getElementById('project-list-desktop');const filtered=applySortFilter(projects);if(!filtered.length){list.innerHTML=`<tr><td colspan="10"><div class="empty-state">該当するプロジェクトがありません</div></td></tr>`;return;}list.innerHTML=filtered.map((p,i)=>`<tr class="project-row${p.done?' done-row':''}" id="row-${p.id}"><td class="row-num">${i+1}</td><td class="check-cell"><input type="checkbox" ${p.done?'checked':''} onchange="toggleDone('${p.id}',this.checked)"/></td><td><textarea class="name-input${p.done?' checked':''}" rows="2" onchange="updateField('${p.id}','name',this.value)" oninput="updateField('${p.id}','name',this.value)">${esc(p.name)}</textarea></td><td><button class="status-badge ${p.status}" onclick="openStatusMenu(event,'${p.id}')">${statusIcon(p.status)} ${p.status}</button></td><td><div class="date-wrap"><input type="date" class="date-input" value="${p.date}" onchange="updateField('${p.id}','date',this.value)"/>${p.date?dateLabel(p.date):'<span style="color:#ccc;font-size:11px;">未設定</span>'}</div></td><td class="td-na-group"><input class="editable na-text" type="text" value="${esc(p.na)}" placeholder="Next Action…" oninput="updateField('${p.id}','na',this.value)" onchange="updateField('${p.id}','na',this.value)"/></td><td><input class="editable owner-text" type="text" value="${esc(p.naOwner)}" placeholder="担当者…" oninput="updateField('${p.id}','naOwner',this.value)" onchange="updateField('${p.id}','naOwner',this.value)"/></td><td><div class="date-wrap"><input type="date" class="date-input" value="${p.naDate}" onchange="updateField('${p.id}','naDate',this.value)"/>${p.naDate?dateLabel(p.naDate):'<span style="color:#ccc;font-size:11px;">未設定</span>'}</div></td><td><textarea class="editable notes-text" rows="2" placeholder="メモ…" oninput="updateField('${p.id}','notes',this.value)" onchange="updateField('${p.id}','notes',this.value)">${esc(p.notes)}</textarea></td><td style="text-align:center;"><button class="action-btn" onclick="deleteProject('${p.id}')" title="削除">✕</button></td></tr>`).join('');}
function renderMobile(){const container=document.getElementById('project-list-mobile');const filtered=applySortFilter(projects);if(!filtered.length){container.innerHTML=`<div class="empty-state">該当するプロジェクトがありません</div>`;return;}container.innerHTML=filtered.map(p=>{const gdate=dateLabelText(p.date),nadate=dateLabelText(p.naDate);return`<div class="card${p.done?' done-row':''}"><div class="card-header"><div class="card-check"><input type="checkbox" ${p.done?'checked':''} onchange="toggleDone('${p.id}',this.checked)"/></div><div class="card-name${p.done?' checked':''}" onclick="openEditModal('${p.id}')">${esc(p.name)}</div><div class="card-actions"><button class="status-badge ${p.status}" onclick="openStatusMenu(event,'${p.id}')">${statusIcon(p.status)} ${p.status}</button><button class="card-del-btn" onclick="deleteProject('${p.id}')">✕</button></div></div><div class="card-divider"></div><div class="card-body"><div class="card-row"><span class="card-lbl">全体期日</span><span class="card-val${gdate?'':' empty'}">${gdate?`<span class="date-tag ${gdate.cls}">${esc(gdate.text)}</span>`:'未設定'}</span></div><div class="card-row"><span class="card-lbl">Next Action</span><span class="card-val na${!p.na?' empty':''}">${p.na?esc(p.na):'未入力'}</span></div>${p.naOwner||p.naDate?`<div class="card-row"><span class="card-lbl">担当 / 期日</span><span class="card-val owner">${p.naOwner?esc(p.naOwner):'—'}${nadate?` <span class="date-tag ${nadate.cls}">${esc(nadate.text)}</span>`:''}</span></div>`:''}${p.notes?`<div class="card-row"><span class="card-lbl">メモ</span><span class="card-val" style="color:#555;">${esc(p.notes)}</span></div>`:''}<div style="display:flex;justify-content:flex-end;margin-top:4px;"><button class="card-edit-btn" onclick="openEditModal('${p.id}')">✏️ 編集</button></div></div></div>`;}).join('')+`<div class="add-card" onclick="openAddModal()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>プロジェクトを追加</div>`;}
window.toggleDone=function(id,checked){fsUpdate(id,{done:checked,status:checked?'完了':'未着手'});};
window.updateField=function(id,field,val){debounce(`${id}-${field}`,()=>fsUpdate(id,{[field]:val}),field==='date'||field==='naDate'?0:900);};
window.openStatusMenu=function(e,id){e.stopPropagation();statusTargetId=id;const sel=document.getElementById('status-selector');sel.style.display='block';const rect=e.currentTarget.getBoundingClientRect();sel.style.top=(rect.bottom+4)+'px';sel.style.left=Math.min(rect.left,window.innerWidth-140)+'px';};
window.setStatus=function(val){if(statusTargetId)fsUpdate(statusTargetId,{status:val,done:val==='完了'});closeStatusMenu();};
function closeStatusMenu(){document.getElementById('status-selector').style.display='none';statusTargetId=null;}
window.deleteProject=function(id){if(!confirm('このプロジェクトを削除しますか？'))return;fsDelete(id);};
window.openAddModal=function(){editingModalId=null;document.getElementById('modal-title').textContent='プロジェクトを追加';['m-name','m-na','m-owner','m-notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('m-status').value='未着手';document.getElementById('m-date').value='';document.getElementById('m-nadate').value='';document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),100);};
window.openEditModal=function(id){const p=projects.find(x=>x.id===id);if(!p)return;editingModalId=id;document.getElementById('modal-title').textContent='プロジェクトを編集';document.getElementById('m-name').value=p.name||'';document.getElementById('m-status').value=p.status||'未着手';document.getElementById('m-date').value=p.date||'';document.getElementById('m-na').value=p.na||'';document.getElementById('m-owner').value=p.naOwner||'';document.getElementById('m-nadate').value=p.naDate||'';document.getElementById('m-notes').value=p.notes||'';document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),100);};
window.closeModal=function(){document.getElementById('modal').classList.remove('open');editingModalId=null;};
window.saveModal=async function(){const name=document.getElementById('m-name').value.trim();if(!name){document.getElementById('m-name').focus();return;}const data={name,status:document.getElementById('m-status').value,date:document.getElementById('m-date').value,na:document.getElementById('m-na').value.trim(),naOwner:document.getElementById('m-owner').value.trim(),naDate:document.getElementById('m-nadate').value,notes:document.getElementById('m-notes').value.trim(),done:document.getElementById('m-status').value==='完了'};window.closeModal();if(editingModalId){await fsUpdate(editingModalId,data);}else{await fsAdd(data);}};
window.exportJSON=function(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(projects,null,2)],{type:'application/json'}));a.download=`projects_${today()}.json`;a.click();};
window.importJSON=function(){document.getElementById('json-file-input').value='';document.getElementById('json-file-input').click();};
window.handleJSONFile=async function(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=async e=>{try{const data=JSON.parse(e.target.result);if(!Array.isArray(data)){alert('形式が正しくありません。');return;}if(!confirm(`${data.length}件をFirebaseに追加します。よろしいですか？`))return;for(const p of data){const{id,...d}=p;await fsAdd({name:d.name||'',status:d.status||'未着手',date:d.date||'',na:d.na||'',naOwner:d.naOwner||'',naDate:d.naDate||'',notes:d.notes||'',done:d.done||false});}}catch{alert('JSONの読み込みに失敗しました。');}};reader.readAsText(file);};
window.exportCSV=function(){const hdr=['No','プロジェクト名','ステータス','全体期日','Next Action','担当','NA期日','メモ','完了'];const rows=projects.map((p,i)=>[i+1,`"${(p.name||'').replace(/"/g,'""')}"`,p.status,p.date,`"${(p.na||'').replace(/"/g,'""')}"`,`"${(p.naOwner||'').replace(/"/g,'""')}"`,p.naDate,`"${(p.notes||'').replace(/"/g,'""')}"`,p.done?'完了':'']);const csv='﻿'+[hdr.join(','),...rows.map(r=>r.join(','))].join('\r\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=`projects_${today()}.csv`;a.click();};
function today(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
window.setFilter=setFilter;window.sortBy=sortBy;window.closeStatusMenu=closeStatusMenu;
document.addEventListener('click',e=>{if(!document.getElementById('status-selector').contains(e.target)&&!e.target.classList.contains('status-badge'))closeStatusMenu();});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))window.closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeStatusMenu();window.closeModal();}});
let unsubscribeSnapshot=null;
// startListenerをグローバルに公開（非moduleのcheckAuth()から呼べるようにする）
window._pmStartListener = startListener;
// checkAuth()から認証完了を受け取るイベントリスナー（匿名認証でFirestore書き込みを有効化）
document.addEventListener('pm-auth-ok', async ()=>{
  document.getElementById('app-wrapper').classList.add('visible');
  if(!auth.currentUser){
    try { await signInAnonymously(auth); } catch(e){ console.warn('anonymous auth failed:', e); }
  }
  if(!unsubscribeSnapshot)startListener();
});

// セッション継続時も匿名認証を通す
if(sessionStorage.getItem('pm_auth')==='ok'){
  document.getElementById('app-wrapper').classList.add('visible');
  if(!auth.currentUser){
    signInAnonymously(auth).catch(e=>console.warn(e)).finally(()=>{ if(!unsubscribeSnapshot)startListener(); });
  } else {
    if(!unsubscribeSnapshot)startListener();
  }
}
</script>
