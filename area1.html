<html lang="ja">

<title>FY27 Area1 活動状況管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo','Yu Gothic',sans-serif;background:#f0f2f5;font-size:13px;color:#333;min-height:100vh}

/* Header */
.hdr{background:linear-gradient(135deg,#003087,#0057B8);color:white;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25);gap:12px}
.hdr-l{display:flex;align-items:center;gap:10px;min-width:0}
.logo{width:30px;height:30px;background:white;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:700;white-space:nowrap}
.hdr-sub{font-size:11px;opacity:.75;margin-top:1px;white-space:nowrap}
.hdr-btns{display:flex;gap:7px;align-items:center;flex-shrink:0}
.btn{padding:7px 13px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn-outline{background:transparent;color:white;border:1px solid rgba(255,255,255,.5)}
.btn-outline:hover{background:rgba(255,255,255,.1)}
.btn-white{background:white;color:#003087}
.btn-white:hover{background:#e8f0ff}
.btn-green{background:#22c55e;color:white}
.btn-green:hover{background:#16a34a}

/* Summary */
.summary{background:white;border-bottom:1px solid #e5e7eb;padding:9px 22px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;min-height:40px}
.stat{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280}
.badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.b-blue{background:#dbeafe;color:#1d4ed8}
.b-red{background:#fee2e2;color:#dc2626}
.b-green{background:#dcfce7;color:#16a34a}
.b-amber{background:#fef3c7;color:#92400e}
.file-badge{font-size:11px;color:#9ca3af;margin-left:auto}
.unsaved{font-size:11px;font-weight:700;color:#f59e0b;display:none}

/* Tabs */
.tabs{background:white;border-bottom:2px solid #e5e7eb;padding:0 22px;display:flex;overflow-x:auto}
.tab{padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:#6b7280;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:#003087}
.tab.active{color:#003087;border-bottom-color:#003087}
.tab-cnt{margin-left:5px;padding:1px 6px;background:#f3f4f6;border-radius:999px;font-size:10px}
.tab.active .tab-cnt{background:#dbeafe;color:#1d4ed8}
.owner-tab{border-left:2px solid #e5e7eb;margin-left:4px;padding-left:16px;color:#0057B8}
.owner-tab.active{color:#003087;border-bottom-color:#003087}
.target-tab{color:#7c3aed}
.target-tab.active{color:#5b21b6;border-bottom-color:#7c3aed}
.target-tab.active .tab-cnt{background:#ede9fe;color:#5b21b6}

/* Toolbar */
.toolbar{padding:10px 22px;display:flex;gap:8px;align-items:center}
.search-inp{padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;width:200px}
.search-inp:focus{outline:none;border-color:#0057B8}
.filter-sel{padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;background:white;cursor:pointer}
.filter-sel:focus{outline:none;border-color:#0057B8}

/* Table */
.tbl-outer{padding:0 22px 28px}
.tbl-wrap{background:white;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow-x:auto;overflow-y:visible}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#1e3a5f;color:white}
th{padding:10px 11px;text-align:left;font-weight:600;font-size:11px;white-space:nowrap;letter-spacing:.3px}
th.eth{background:#2c5282;text-align:center}
th.eth::after{content:' ✎';opacity:.5;font-size:9px}
tbody tr{border-bottom:1px solid #f0f2f5;transition:background .1s}
tbody tr:hover{background:#f8faff}
tbody tr.crow{background:#fffbeb!important}
tbody tr.ostart{border-top:2px solid #e5e7eb}
td{padding:8px 11px;vertical-align:middle}
td.otd{font-weight:700;color:#1e3a5f;white-space:nowrap;font-size:12px}
td.atd{font-weight:600;color:#374151;min-width:180px}
td.rtd{text-align:right;color:#374151;white-space:nowrap}
td.ctd{text-align:center;color:#374151}

/* Account type badges */
.at{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.at-ea{background:#fef3c7;color:#92400e}
.at-ep{background:#dbeafe;color:#1e3a8a}
.at-e{background:#e0e7ff;color:#3730a3}
.at-bp{background:#d1fae5;color:#065f46}
.at-b{background:#f3f4f6;color:#374151}

/* Editable cell */
td.etd{cursor:pointer;position:relative;min-width:120px}
td.etd.ctr{text-align:center}
.cv{padding:3px 5px;border-radius:4px;min-height:22px;display:inline-block;max-width:100%}
td.etd:hover .cv{background:#eff6ff}
.cempty{color:#c4c9d4;font-style:italic;font-size:11px}
.cred{color:#dc2626;font-weight:600}
.cgreen{color:#16a34a;font-weight:700}
.cx{color:#dc2626;font-weight:700}
.cdate{color:#374151}
.cnote{color:#333}
.ehint{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:9px;color:#c4c9d4;opacity:0;transition:opacity .1s}
td.etd:hover .ehint{opacity:1}

/* Editing cell */
td.editing{padding:5px 8px;min-width:200px}
.qbtns{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap}
.qb{padding:3px 9px;border-radius:4px;border:1px solid #d1d5db;background:white;cursor:pointer;font-size:11px;font-weight:600;color:#374151;transition:all .1s}
.qb:hover{background:#eff6ff;border-color:#0057B8;color:#0057B8}
.qb.qg{border-color:#22c55e;color:#16a34a}.qb.qg:hover{background:#dcfce7}
.qb.qr{border-color:#ef4444;color:#dc2626}.qb.qr:hover{background:#fee2e2}
.qb.qd{border-color:#8b5cf6;color:#7c3aed}.qb.qd:hover{background:#ede9fe}
.cell-ed{width:100%;padding:5px 7px;border:2px solid #0057B8;border-radius:5px;font-size:12px;background:white;outline:none}
.cell-sel{width:100%;padding:5px 7px;border:2px solid #0057B8;border-radius:5px;font-size:12px;background:white;outline:none}
.edhint{font-size:10px;color:#9ca3af;margin-top:3px}

/* Date age colors */
.cdatewarn{color:#d97706;font-weight:600}
.cdatealert{color:#dc2626;font-weight:700}

/* Manager follow */
.mgr-cb{width:16px;height:16px;cursor:pointer;accent-color:#f59e0b}
tbody tr.mgr-row{background:#fffbeb!important}
tbody tr.mgr-row:hover{background:#fef3c7!important}
td.mgr-acct{color:#d97706!important;font-weight:700!important}
td.mgr-acct::before{content:'★ ';font-size:10px}
th.chk-th{width:36px;text-align:center;padding:10px 6px}
td.chk-td{text-align:center;padding:8px 6px;width:36px}

/* Global search badge */
.sheet-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:#dbeafe;color:#1e3a8a;white-space:nowrap;margin-right:4px}

/* No data */
.nodata{text-align:center;padding:36px;color:#9ca3af;font-size:13px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#1e3a5f;color:white;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:translateY(0)}

/* ── Login Screen ── */
#login-screen{display:none;position:fixed;inset:0;background:#f0f2f5;z-index:2000;align-items:center;justify-content:center;flex-direction:column}
#login-screen.visible{display:flex}
.login-card{background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:40px 36px;text-align:center;max-width:360px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.login-logo{width:48px;height:48px;background:linear-gradient(135deg,#003087,#0057B8);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.login-title{font-size:18px;font-weight:700;color:#1e3a5f;margin-bottom:6px}
.login-sub{font-size:13px;color:#6b7280;margin-bottom:28px;line-height:1.6}
.btn-google{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;background:#fff;border:1px solid #d1d5db;border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer;color:#374151;font-weight:500;transition:background .15s;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.btn-google:hover{background:#f9fafb}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.login-error{font-size:12px;color:#dc2626;margin-top:14px;display:none}
.login-error.visible{display:block}

/* ── Sync Badge ── */
.sync-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.sync-chip.saving{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8)}
.sync-chip.synced{background:rgba(34,197,94,.2);color:#86efac}
.sync-chip.error{background:rgba(239,68,68,.2);color:#fca5a5}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
</style>

      onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="auth-error" style="color:#ef4444;font-size:12px;margin-bottom:10px;min-height:16px;"></div>
    <button onclick="checkAuth()"
      style="width:100%;padding:12px;background:#003087;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">

<script>
(function(){
  if(sessionStorage.getItem('area1_auth')==='ok'){
    document.getElementById('auth-overlay').style.display='none';
  }
})();
function checkAuth(){
  var pw=document.getElementById('auth-input').value;
  if(pw==='¥1103737712'){
    sessionStorage.setItem('area1_auth','ok');
    document.getElementById('auth-overlay').style.display='none';
    // init()はFirebase認証ではなくパスワード認証後に呼ぶ
    if(typeof init==='function') init();
  } else {
    document.getElementById('auth-error').textContent='パスワードが正しくありません';
    document.getElementById('auth-input').value='';
    document.getElementById('auth-input').focus();
  }
}
</script>

}

function init(){
// 古いバージョンのlocalStorageを削除
Object.keys(localStorage).filter(k=>k.startsWith('fy27')).forEach(k=>{if(k!==LS_KEY)localStorage.removeItem(k);});
try{const s=localStorage.getItem(LS_KEY);if(s){const p=JSON.parse(s);data=p.data;lastFile=p.lastFile||null;fillDefaults(data);}else{data=clone(INITIAL_DATA);fillDefaults(data);}}
catch(e){data=clone(INITIAL_DATA);fillDefaults(data);}
renderAll();
}
function clone(o){return JSON.parse(JSON.stringify(o));}

// Summary
function renderSummary(){
let html='';
if(ownerMode){
html+=`<div class="stat"><span style="font-weight:700;color:#003087">👤 担当者ビュー</span></div>`;
if(of){
let total=0;SHEETS.forEach(s=>{total+=(data[s]||[]).filter(r=>r.owner===of).length;});
const mgrCnt=SHEETS.reduce((a,s)=>a+(data[s]||[]).filter(r=>r.owner===of&&r.mgrFollow).length,0);
html+=`<div class="stat"><span>${h(of)} の総件数</span><span class="badge b-blue">${total}</span></div>`;
SHEETS.forEach(s=>{const n=(data[s]||[]).filter(r=>r.owner===of).length;if(n>0)html+=`<div class="stat"><span class="badge" style="background:#f1f5f9;color:#374151">${h(TAB_LABEL[s])}</span><span style="font-size:11px;color:#6b7280">${n}件</span></div>`;});
if(mgrCnt>0)html+=`<div class="stat"><span>📌 MGRフォロー</span><span class="badge b-amber">${mgrCnt}件</span></div>`;
} else {
html+=`<div class="stat"><span style="color:#9ca3af">← 担当者を選択してください</span></div>`;
}
document.getElementById('summaryBar').innerHTML=html;return;
}
const rows=data[sheet]||[];const isMain=MAIN_SHEETS.has(sheet);
html+=`<div class="stat"><span>アカウント数</span><span class="badge b-blue">${rows.length}</span></div>`;
if(isMain){
const dealOk=rows.filter(r=>r.upgrade&&r.upgrade.trim()&&r.upgrade!=='未'&&r.upgrade!=='X').length;
const exOk=rows.filter(r=>r.exec&&r.exec!=='未'&&r.exec!=='X').length;
html+=`<div class="stat"><span>商談あり</span><span class="badge b-green">${dealOk}</span></div>`;
html+=`<div class="stat"><span>Exec済</span><span class="badge b-green">${exOk}</span></div>`;
}
const mgrCnt=rows.filter(r=>r.mgrFollow).length;
const mgrTotal=SHEETS.reduce((a,s)=>a+(data[s]||[]).filter(r=>r.mgrFollow).length,0);
if(mgrCnt>0||mgrTotal>0)html+=`<div class="stat"><span>📌 MGRフォロー</span><span class="badge b-amber">${mgrCnt}件</span>${mgrTotal!==mgrCnt?`<span style="font-size:11px;color:#9ca3af;margin-left:4px">全体${mgrTotal}件</span>`:''}</div>`;
const changed=rows.filter(r=>r._c).length;
if(changed)html+=`<div class="stat"><span class="badge b-amber">${changed}行 変更済</span></div>`;
if(lastFile)html+=`<span class="file-badge">📄 ${h(lastFile)}</span>`;
html+=`<span class="unsaved" id="uns" style="display:${hasChanges?'inline':'none'}">● 未保存の変更あり</span>`;
document.getElementById('summaryBar').innerHTML=html;
}

// Owner filter
function updateOwnerSel(){
let owners;
if(ownerMode){
const ownerSet=new Set();SHEETS.forEach(s=>(data[s]||[]).forEach(r=>{if(r.owner)ownerSet.add(r.owner);}));
owners=[...ownerSet].sort();
} else {
const rows=data[sheet]||[];
owners=[...new Set(rows.filter(r=>r.owner).map(r=>r.owner))].sort();
}
const sel=document.getElementById('ownerSel');
const ph=ownerMode?'👤 担当者を選択...':'担当者：すべて';
sel.innerHTML=`<option value="">${ph}</option>`+owners.map(o=>`<option value="${ha(o)}"${of===o?' selected':''}>${h(o)}</option>`).join('');
}
function onSearch(){sv=document.getElementById('searchInp').value;ec=null;renderTable();}
function onFilter(){of=document.getElementById('ownerSel').value;stf=document.getElementById('statusSel').value;ec=null;if(ownerMode){renderSummary();renderTable();}else renderTable();}

function dealField(s){return MAIN_SHEETS.has(s)?'upgrade':'dealLink';}
function matchDeal(r,s){
if(!stf)return true;
const v=r[dealField(s)]||'';
if(stf==='empty')return!v;
return v.includes(stf);
}
function getRows(){
if(sv){
// 全シート横断検索
let all=[];
SHEETS.forEach(s=>{
(data[s]||[]).forEach(r=>{
if(r.account.toLowerCase().includes(sv.toLowerCase())||(r.owner||'').toLowerCase().includes(sv.toLowerCase()))
all.push(Object.assign({},r,{_sheet:s}));
});
});
return all;
}
if(ownerMode){
if(!of)return[];
const all=[];
SHEETS.forEach(s=>{
(data[s]||[]).forEach(r=>{
if(r.owner===of&&matchDeal(r,s))all.push(Object.assign({},r,{_sheet:s}));
});
});
return all;
}
return(data[sheet]||[]).filter(r=>{
if(of&&r.owner!==of)return false;
if(!matchDeal(r,sheet))return false;
return true;
});
}

</div>`;
}
const cv=ha(ec.v||'');
return`<td class="editing" style="position:relative">${qb}<input type="text" class="cell-ed" id="aed" value="${cv}" onblur="cTx(this.value,'${f}','${r.id}')" onkeydown="ekey(event,'${f}','${r.id}')"><div class="edhint">Enter確定 / Esc キャンセル</div></td>`;

const v=r[f]||'';

return`<td class="${ctr}" onclick="se('${r.id}','${f}')"><div class="cv ${ccls}">${v?h(v):'<span class="cempty">— 未入力 —</span>'}</div><span class="ehint">✎</span></td>`;

// Edit actions
function se(id,f){
const r=fr(id);
ec={id,f,v:r?r[f]||'':''};
renderTable();
setTimeout(()=>{const i=document.getElementById('aed');if(i){i.focus();if(i.tagName==='INPUT'&&i.type!=='date')i.select();}},10);
}
function ev(e){e.preventDefault();}
function iq(txt,replace){
const i=document.getElementById('aed');if(!i)return;
if(replace){i.value=txt;}
else{const p=i.selectionStart||i.value.length;i.value=i.value.slice(0,p)+txt+i.value.slice(p);i.selectionStart=i.selectionEnd=p+txt.length;}
if(ec)ec.v=i.value;
i.focus();
}
function cTx(val,f,id){
if(!ec||ec.id!==id||ec.f!==f)return;
const r=fr(id);
if(r&&r[f]!==val){r[f]=val;r._c=true;hasChanges=true;}
ec=null;save();renderAll();
}
function cSel(val,f,id){cTx(val,f,id);}
function cDate(val,f,id){cTx(val?val.replace(/-/g,'/'):val,f,id);}
function ekey(e,f,id){
if(e.key==='Enter'){e.preventDefault();const i=document.getElementById('aed');if(!i)return;if(f==='endDate')cDate(i.value,f,id);else cTx(i.value,f,id);}
if(e.key==='Escape'){e.preventDefault();ec=null;renderTable();}
}
function fr(id){return(data[sheet]||[]).find(r=>r.id===id);}

// Import / Export
function importJSON(inp){
const file=inp.files[0];if(!file)return;
const rd=new FileReader();
rd.onload=e=>{
try{
const imp=JSON.parse(e.target.result);
if(!SHEETS.some(s=>imp[s]))throw new Error('invalid');
fillDefaults(imp);
data=imp;lastFile=file.name;hasChanges=false;ec=null;
save();renderAll();toast('✅ 読み込み完了：'+file.name);
}catch(err){toast('❌ JSONの読み込みに失敗しました');}
};
rd.readAsText(file);inp.value='';
}

getRow=r=>[r.mgrFollow?'★':'',r.owner,r.account,r.salePriority,r.dealLink,r.closeDate,r.phase,r.lastActivity,r.obrReq,r.obrMemo,r.exec,r.tanto,r.memo];
} else {

getRow=r=>[r.mgrFollow?'★':'',r.owner,r.account,r.dealLink,r.closeDate,r.phase,r.lastActivity,r.exec,r.cco,r.tanto,r.tamen,r.memo];

const lines=[heads,...rows.map(r=>getRow(r).map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`))]
.map(l=>l.join(','));

function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

// Helpers
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ha(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function trunc(s,n){return s.length>n?s.slice(0,n)+'…':s;}
function toIso(s){if(!s)return'';const m=s.match(/(\d{4})[\/\-](\d{2})[\/\-](\d{2})/);return m?`${m[1]}-${m[2]}-${m[3]}`:''}
function atcls(v){if(!v)return'';if(v.includes('Advanced'))return'at-ea';if(v.includes('Enterprise Plus'))return'at-ep';if(v==='Enterprise')return'at-e';if(v.includes('Business Plus'))return'at-bp';return'at-b';}
function dateAge(v){
const m=(v||'').match(/(\d{4})\/(\d{2})\/(\d{2})/);
if(!m)return null;
const d=new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
return(new Date()-d)/86400000;
}
function vcls(v,type){
if(!v)return'';
if(v==='有'||v==='○'||v==='参加')return'cgreen';
if(v==='未'||v==='未案内')return'cred';
if(v==='X'||v==='NG')return'cx';
if(v.startsWith('案内予定'))return'cdate';
if(v==='回答待ち')return'cdatewarn';
if(/^\d{4}\/\d/.test(v)||/^\d+\/\d+：/.test(v)||/^\d{4}年/.test(v)){
const age=dateAge(v);
if(age!==null&&age>=180)return'cdatealert';
if(age!==null&&age>=90)return'cdatewarn';
return'cdate';
}
return'cnote';
}

// ── 同期バッジ ────────────────────────────────────────
function setSyncChip(cls, label) {
const el = document.getElementById('sync-chip');
if (!el) return;
el.className = `sync-chip ${cls}`;
el.innerHTML = `<div class="sync-dot"></div>${label}`;
}

// ── Firestore保存（デバウンス1秒） ────────────────────
let _fsTimer = null;
function save() {
// ローカル保存（即時） - Firestore不使用
try { localStorage.setItem(LS_KEY, JSON.stringify({data, lastFile})); } catch(e) {}
setSyncChip('synced', 'ローカル保存済み');
}

async function saveToFirestore() {
setSyncChip('saving', '保存中…');
try {
const batch = _db.batch();
SHEETS.forEach((s, i) => {
const ref = _db.collection('area1_data').doc('sheet_' + i);
batch.set(ref, { rows: data[s] || [], sheet: s, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
});
const metaRef = _db.collection('area1_data').doc('meta');
batch.set(metaRef, { lastFile: lastFile || null, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
await batch.commit();
setSyncChip('synced', 'Firebase同期中');
} catch(e) {
setSyncChip('error', '保存失敗');
console.error('Firestore保存エラー:', e);
}
}

// ── Firestore読み込み ─────────────────────────────────
async function loadFromFirestore() {
try {
const docs = await Promise.all(
SHEETS.map((s, i) => _db.collection('area1_data').doc('sheet_' + i).get())
);
const metaDoc = await _db.collection('area1_data').doc('meta').get();
if (docs.some(d => d.exists)) {
data = {};
SHEETS.forEach((s, i) => { data[s] = docs[i].exists ? docs[i].data().rows || [] : []; });
if (metaDoc.exists) lastFile = metaDoc.data().lastFile || null;
fillDefaults(data);
return true;
}
} catch(e) { console.error('Firestore読み込みエラー:', e); }
return false;
}

// ── init()を上書き（localStorage優先・Firestore不使用） ──────────────────

Object.keys(localStorage).filter(k=>k.startsWith('fy27')).forEach(k=>{if(k!==LS_KEY)localStorage.removeItem(k);});

if (s) { const p = JSON.parse(s); data = p.data; lastFile = p.lastFile || null; fillDefaults(data); }
else { data = clone(INITIAL_DATA); fillDefaults(data); }
} catch(e) { data = clone(INITIAL_DATA); fillDefaults(data); }
setSyncChip('synced', 'ローカル保存済み');
renderAll();
}
